<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caja Dorada - Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #060e1a; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: #fff; padding: 1rem; }
    h1 { font-size: 20px; font-weight: 700; color: #00d4ff; margin-bottom: 2px; }
    .sub { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 1rem; }
    #sync-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 1rem; font-size: 12px; color: rgba(255,255,255,0.45); }
    #sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #888; flex-shrink: 0; }
    #sync-dot.ok { background: #5DCAA5; }
    #sync-dot.err { background: #f09595; }
    #sync-dot.loading { background: #f0c84a; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    #loteria-bar { display: flex; gap: 8px; margin-bottom: 1rem; align-items: center; }
    #loteria-bar label { font-size: 12px; color: rgba(255,255,255,0.5); white-space: nowrap; }
    #inp-loteria { flex: 1; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: #fff; padding: 7px 10px; font-size: 13px; outline: none; }
    #btn-loteria { padding: 7px 14px; border-radius: 8px; border: none; background: #00d4ff; color: #060e1a; font-size: 13px; font-weight: 600; cursor: pointer; }
    #main-tabs { display: flex; gap: 6px; margin-bottom: 1rem; }
    .main-tab { padding: 7px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.6); font-size: 13px; cursor: pointer; }
    .main-tab.active { background: #00d4ff; color: #060e1a; border-color: #00d4ff; font-weight: 600; }
    #action-bar { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
    .action-btn { padding: 7px 14px; border-radius: 8px; border: none; font-size: 13px; cursor: pointer; font-weight: 600; }
    #btn-export { background: #1d6f42; color: #fff; }
    #btn-reset-all { background: #8b1a1a; color: #fff; }
    #btn-refresh { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); }
    .vendor-tabs-wrap { overflow-x: auto; margin-bottom: 1rem; padding-bottom: 4px; }
    .vendor-tabs { display: flex; gap: 6px; min-width: max-content; }
    .vendor-tab { padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.55); font-size: 12px; cursor: pointer; white-space: nowrap; }
    .vendor-tab.active { background: rgba(0,212,255,0.15); border-color: #00d4ff; color: #00d4ff; font-weight: 600; }
    .rifa-block { background: #0d1e35; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); margin-bottom: 0.75rem; }
    .rifa-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: rgba(0,212,255,0.07); border-bottom: 1px solid rgba(255,255,255,0.06); }
    .rifa-name { font-size: 14px; font-weight: 600; color: #00d4ff; }
    .rifa-stats { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
    .btn-reset-one { padding: 5px 12px; border-radius: 6px; border: none; background: #8b1a1a; color: #fff; font-size: 11px; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.4); font-weight: 500; padding: 8px 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.06); }
    td { padding: 7px 12px; border-bottom: 1px solid rgba(255,255,255,0.03); color: rgba(255,255,255,0.8); }
    tr:last-child td { border-bottom: none; }
    .num-col { font-weight: 700; color: #00d4ff; width: 50px; }
    .badge-sold { display: inline-block; background: rgba(58,184,110,0.15); color: #3ab86e; border-radius: 4px; padding: 2px 8px; font-size: 11px; }
    .badge-free { display: inline-block; background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.25); border-radius: 4px; padding: 2px 8px; font-size: 11px; }
    .badge-fake { display: inline-block; background: rgba(212,160,23,0.15); color: #d4a017; border-radius: 4px; padding: 2px 8px; font-size: 11px; }
    .badge-pagado { display: inline-block; background: rgba(58,184,110,0.15); color: #3ab86e; border-radius: 4px; padding: 2px 8px; font-size: 11px; }
    .badge-pendiente { display: inline-block; background: rgba(232,200,58,0.15); color: #c8a010; border-radius: 4px; padding: 2px 8px; font-size: 11px; }
    .empty-state { text-align: center; padding: 2.5rem; color: rgba(255,255,255,0.3); font-size: 13px; }
    .hist-day { background: #0d1e35; border-radius: 10px; margin-bottom: 0.75rem; border: 1px solid rgba(255,255,255,0.08); overflow: hidden; }
    .hist-day-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; cursor: pointer; }
    .hist-day-title { font-size: 13px; font-weight: 600; color: #fff; text-transform: capitalize; }
    .hist-day-sub { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 2px; }
    .hist-day-body { display: none; padding: 0 14px 12px; }
    .hist-day-body.open { display: block; }
    #modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 100; }
    #modal-bg.open { display: flex; }
    #modal { background: #0d1e35; border: 1px solid #2a4a6a; border-radius: 14px; padding: 1.5rem; width: min(320px, 90vw); }
    #modal h2 { font-size: 15px; font-weight: 600; color: #f09595; margin-bottom: 8px; }
    #modal p { font-size: 13px; color: rgba(255,255,255,0.55); margin-bottom: 1.25rem; line-height: 1.5; }
    #modal-actions { display: flex; gap: 8px; }
    .m-btn { flex: 1; border-radius: 8px; padding: 10px; cursor: pointer; font-size: 13px; border: none; font-weight: 600; }
    #mc-cancel { background: transparent; border: 1px solid #2a4a6a; color: #8ab4cc; }
    #mc-confirm { background: #8b1a1a; color: #fff; }
    #export-modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 200; }
    #export-modal-bg.open { display: flex; }
    #export-modal { background: #0d1e35; border: 1px solid #2a4a6a; border-radius: 14px; padding: 1.5rem; width: min(340px, 92vw); }
    #export-modal h2 { font-size: 15px; font-weight: 600; color: #00d4ff; margin-bottom: 1rem; }
  .color-preset { padding: 4px 10px; border-radius: 6px; border: 2px solid transparent; font-size: 11px; cursor: pointer; color: #333; font-weight: 600; }
  .color-preset:hover { border-color: #00d4ff; }
    #export-modal p { font-size: 13px; color: rgba(255,255,255,0.55); margin-bottom: 1rem; }
    .exp-btn { display: block; width: 100%; margin-bottom: 6px; padding: 10px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05); color: #fff; font-size: 13px; text-align: left; cursor: pointer; }
    .exp-btn-primary { border-color: #00d4ff; background: rgba(0,212,255,0.1); color: #00d4ff; font-weight: 600; }
    .exp-btn-back { color: #8ab4cc; border-color: #2a4a6a; }
    .exp-btn-cancel { color: rgba(255,255,255,0.35); border-color: #2a4a6a; background: transparent; margin-top: 4px; }
  </style>
</head>
<body>

<h1>Caja Dorada</h1>
<div class="sub">Panel de administrador</div>

<div id="sync-bar">
  <div id="sync-dot" class="loading"></div>
  <span id="sync-text">Conectando...</span>
</div>

<div id="loteria-bar">
  <label>Loteria del dia:</label>
  <input type="text" id="inp-loteria" placeholder="Ej: Loteria de Manizales" />
  <button id="btn-loteria">Guardar</button>
</div>
<div id="color-bar" style="display:flex;gap:8px;margin-bottom:1rem;align-items:center;flex-wrap:wrap;">
  <label style="font-size:12px;color:rgba(255,255,255,0.5);white-space:nowrap;">Color de fondo:</label>
  <input type="color" id="inp-grid-color" value="#0a1628" style="width:36px;height:32px;border:none;border-radius:6px;cursor:pointer;padding:0;" />
  <div id="color-presets" style="display:flex;gap:6px;flex-wrap:wrap;">
    <button class="color-preset" data-color="#0a1628" style="background:#0a1628;color:#fff;">Azul</button>
    <button class="color-preset" data-color="#0a2010" style="background:#0a2010;color:#fff;">Verde</button>
    <button class="color-preset" data-color="#1a0a28" style="background:#1a0a28;color:#fff;">Morado</button>
    <button class="color-preset" data-color="#1a1000" style="background:#1a1000;color:#fff;">Cafe</button>
    <button class="color-preset" data-color="#1a0808" style="background:#1a0808;color:#fff;">Rojo</button>
    <button class="color-preset" data-color="#001a1a" style="background:#001a1a;color:#fff;">Teal</button>
  </div>
  <button id="btn-color" style="padding:7px 14px;border-radius:8px;border:none;background:#00d4ff;color:#060e1a;font-size:13px;font-weight:600;cursor:pointer;">Aplicar</button>
</div>

<div id="main-tabs">
  <button class="main-tab active" id="tab-hoy">Hoy</button>
  <button class="main-tab" id="tab-hist">Historial (7 dias)</button>
</div>

<div id="action-bar">
  <button class="action-btn" id="btn-export">Exportar Excel</button>
  <button class="action-btn" id="btn-reset-all">Resetear todo</button>
  <button class="action-btn" id="btn-refresh">Actualizar</button>
</div>

<div id="content">
  <div class="empty-state">Cargando datos...</div>
</div>

<div id="modal-bg">
  <div id="modal">
    <h2 id="modal-title">Confirmar reseteo</h2>
    <p id="modal-msg"></p>
    <div id="modal-actions">
      <button class="m-btn" id="mc-cancel">Cancelar</button>
      <button class="m-btn" id="mc-confirm">Si, resetear</button>
    </div>
  </div>
</div>

<div id="export-modal-bg">
  <div id="export-modal">
    <h2>Exportar Excel</h2>
    <div id="export-paso1">
      <p>Que datos quieres exportar?</p>
      <button class="exp-btn exp-btn-primary" id="exp-btn-hoy">Hoy</button>
      <button class="exp-btn" id="exp-btn-hist">Historial</button>
    </div>
    <div id="export-paso2" style="display:none">
      <p>Selecciona el dia a exportar:</p>
      <div id="export-dias-list"></div>
      <button class="exp-btn exp-btn-back" id="exp-btn-back">Volver</button>
    </div>
    <button class="exp-btn exp-btn-cancel" id="exp-btn-cancel">Cancelar</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
var db, allData, historialData, tabActual, vendedorActual, resetKey;
allData = {};
historialData = {};
tabActual = 'hoy';
vendedorActual = null;
resetKey = null;

function setSyncStatus(type, text) {
  document.getElementById('sync-dot').className = type;
  document.getElementById('sync-text').textContent = text;
}

function fechaHoy() {
  return new Date().toISOString().slice(0, 10);
}

function fechaLabel(iso) {
  var d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString('es-CO', { weekday: 'long', day: 'numeric', month: 'long' });
}

function tsToHora(ts) {
  if (!ts) return '-';
  return new Date(ts).toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
}

function keyToLabel(key) {
  var parts = key.split('_');
  var vendedor = parts[0] || '';
  var valor = parts[1] || '';
  var grupo = parts[2] ? parts[2].replace('g', 'Grupo #') : '';
  return (vendedor + ' ' + valor + ' ' + grupo).trim();
}

function limpiarClave(k) {
  return k.replace(/[.#$[\]\/]/g, '_');
}

function valorDesdeKey(key) {
  var parts = key.split('_');
  var valStr = parts[1] || '0k';
  var num = parseInt(valStr.replace('k', ''), 10);
  return num * 1000;
}

function guardarColor(color) {
  db.ref('config/gridColor').set(color).then(function() {
    setSyncStatus('ok', 'Color actualizado en todos los vendedores');
  });
}

function guardarLoteria() {
  var nombre = document.getElementById('inp-loteria').value.trim();
  if (!nombre) return;
  db.ref('config/loteria').set(nombre).then(function() {
    setSyncStatus('ok', 'Loteria guardada: ' + nombre);
  });
}

function cargarDatos() {
  setSyncStatus('loading', 'Cargando...');
  db.ref('rifas').once('value').then(function(snap) {
    allData = snap.val() || {};
    setSyncStatus('ok', 'Actualizado');
    if (tabActual === 'hoy') renderTabHoy();
  }).catch(function() {
    setSyncStatus('err', 'Error al cargar');
  });
  db.ref('historial').once('value').then(function(snap) {
    historialData = snap.val() || {};
    if (tabActual === 'historial') renderHistorial();
  });
}

function showTab(tab) {
  tabActual = tab;
  document.getElementById('tab-hoy').classList.toggle('active', tab === 'hoy');
  document.getElementById('tab-hist').classList.toggle('active', tab === 'historial');
  if (tab === 'hoy') renderTabHoy();
  else renderHistorial();
}

function seleccionarVendedor(key) {
  vendedorActual = key;
  renderTabHoy();
}

function buildTabla(numeros) {
  var filas = '';
  for (var i = 0; i < 100; i++) {
    var dato = numeros[i] || numeros[String(i)];
    var num = String(i).padStart(2, '0');
    if (dato) {
      var esFake = dato.tipo === 'fake';
      var pagado = dato.pago === 'pagado';
      var estadoHtml = esFake ? '<span class="badge-fake">Fake</span>' : '<span class="badge-sold">Vendido</span>';
      var pagoHtml = esFake ? '-' : (pagado ? '<span class="badge-pagado">Pagado</span>' : '<span class="badge-pendiente">Sin pagar</span>');
      filas += '<tr><td class="num-col">' + num + '</td>';
      filas += '<td>' + estadoHtml + '</td>';
      filas += '<td>' + pagoHtml + '</td>';
      filas += '<td>' + (esFake ? '-' : (dato.apodo || '-')) + '</td>';
      filas += '<td>' + (esFake ? '-' : (dato.tel || '-')) + '</td>';
      filas += '<td>' + tsToHora(dato.ts) + '</td></tr>';
    } else {
      filas += '<tr><td class="num-col">' + num + '</td>';
      filas += '<td><span class="badge-free">Libre</span></td>';
      filas += '<td>-</td><td>-</td><td>-</td><td>-</td></tr>';
    }
  }
  return '<table><thead><tr><th>#</th><th>Estado</th><th>Pago</th><th>Apodo</th><th>Telefono</th><th>Hora</th></tr></thead><tbody>' + filas + '</tbody></table>';
}

function renderTabHoy() {
  var content = document.getElementById('content');
  var keys = Object.keys(allData);
  if (keys.length === 0) {
    content.innerHTML = '<div class="empty-state">No hay rifas registradas hoy.</div>';
    return;
  }
  if (!vendedorActual || !allData[vendedorActual]) {
    vendedorActual = keys[0];
  }
  var tabsHtml = '';
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i];
    var active = k === vendedorActual ? ' active' : '';
    tabsHtml += '<button class="vendor-tab' + active + '" data-key="' + k + '">' + keyToLabel(k) + '</button>';
  }
  var key = vendedorActual;
  var numeros = (allData[key] && allData[key].numeros) ? allData[key].numeros : {};
  var vendidos = 0;
  var nkeys = Object.keys(numeros);
  for (var j = 0; j < nkeys.length; j++) {
    if (nkeys[j] !== 'null') vendidos++;
  }
  content.innerHTML =
    '<div class="vendor-tabs-wrap"><div class="vendor-tabs" id="vendor-tabs-inner">' + tabsHtml + '</div></div>' +
    '<div class="rifa-block">' +
    '<div class="rifa-header">' +
    '<div><div class="rifa-name">' + keyToLabel(key) + '</div>' +
    '<div class="rifa-stats">' + vendidos + ' vendidos - ' + (100 - vendidos) + ' disponibles</div></div>' +
    '<button class="btn-reset-one" data-reset="' + key + '">Resetear</button>' +
    '</div>' + buildTabla(numeros) + '</div>';

  document.getElementById('vendor-tabs-inner').addEventListener('click', function(e) {
    var btn = e.target.closest('.vendor-tab');
    if (btn) seleccionarVendedor(btn.getAttribute('data-key'));
  });
  content.querySelector('.btn-reset-one').addEventListener('click', function() {
    confirmarReset(this.getAttribute('data-reset'));
  });
}

function renderHistorial() {
  var content = document.getElementById('content');
  var dias = Object.keys(historialData).sort().reverse().slice(0, 7);
  if (dias.length === 0) {
    content.innerHTML = '<div class="empty-state">No hay historial aun. El historial se guarda al resetear.</div>';
    return;
  }
  content.innerHTML = '';
  for (var d = 0; d < dias.length; d++) {
    var dia = dias[d];
    var rifas = historialData[dia] || {};
    var rkeys = Object.keys(rifas);
    var totalVendidos = 0;
    for (var r = 0; r < rkeys.length; r++) {
      var nks = Object.keys(rifas[rkeys[r]].numeros || {});
      for (var n = 0; n < nks.length; n++) {
        if (nks[n] !== 'null') totalVendidos++;
      }
    }
    var div = document.createElement('div');
    div.className = 'hist-day';
    var rifasHtml = '';
    for (var r2 = 0; r2 < rkeys.length; r2++) {
      var rk = rkeys[r2];
      var numeros2 = (rifas[rk] && rifas[rk].numeros) ? rifas[rk].numeros : {};
      var vendidos2 = 0;
      var nk2 = Object.keys(numeros2);
      for (var n2 = 0; n2 < nk2.length; n2++) {
        if (nk2[n2] !== 'null') vendidos2++;
      }
      rifasHtml += '<div class="rifa-block">';
      rifasHtml += '<div class="rifa-header"><div>';
      rifasHtml += '<div class="rifa-name">' + keyToLabel(rk) + '</div>';
      rifasHtml += '<div class="rifa-stats">' + vendidos2 + ' vendidos - ' + (100 - vendidos2) + ' disponibles</div>';
      rifasHtml += '</div></div>' + buildTabla(numeros2) + '</div>';
    }
    div.innerHTML =
      '<div class="hist-day-header" data-dia="' + dia + '">' +
      '<div><div class="hist-day-title">' + fechaLabel(dia) + '</div>' +
      '<div class="hist-day-sub">' + rkeys.length + ' rifas - ' + totalVendidos + ' numeros vendidos</div></div>' +
      '<span style="color:rgba(255,255,255,0.3)">+</span></div>' +
      '<div class="hist-day-body" id="dia-' + dia + '">' + rifasHtml + '</div>';
    div.querySelector('.hist-day-header').addEventListener('click', function() {
      var dia2 = this.getAttribute('data-dia');
      document.getElementById('dia-' + dia2).classList.toggle('open');
    });
    content.appendChild(div);
  }
}

function confirmarReset(key) {
  resetKey = key;
  document.getElementById('modal-title').textContent = key ? 'Resetear rifa' : 'Resetear todo';
  document.getElementById('modal-msg').textContent = key
    ? 'Borrar todos los numeros de ' + keyToLabel(key) + '? Se guardara en el historial.'
    : 'Borrar TODAS las rifas de hoy? Se guardaran en el historial.';
  document.getElementById('modal-bg').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
  resetKey = null;
}

function ejecutarReset() {
  var hoy = fechaHoy();
  closeModal();
  if (resetKey) {
    var dato = allData[resetKey];
    if (!dato) return;
    var clave = limpiarClave(resetKey);
    db.ref('historial/' + hoy + '/' + clave).set(dato).then(function() {
      return db.ref('rifas/' + clave).remove();
    }).then(function() {
      delete allData[resetKey];
      vendedorActual = null;
      renderTabHoy();
    });
  } else {
    db.ref('historial/' + hoy).set(allData).then(function() {
      return db.ref('rifas').remove();
    }).then(function() {
      allData = {};
      vendedorActual = null;
      renderTabHoy();
    });
  }
}

function abrirExportModal() {
  document.getElementById('export-paso1').style.display = 'block';
  document.getElementById('export-paso2').style.display = 'none';
  document.getElementById('export-modal-bg').classList.add('open');
}

function cerrarExportModal() {
  document.getElementById('export-modal-bg').classList.remove('open');
}

function mostrarHistorialExport() {
  var dias = Object.keys(historialData).sort().reverse().slice(0, 7);
  if (dias.length === 0) { alert('No hay historial guardado aun.'); return; }
  document.getElementById('export-paso1').style.display = 'none';
  document.getElementById('export-paso2').style.display = 'block';
  var lista = document.getElementById('export-dias-list');
  lista.innerHTML = '';
  for (var d = 0; d < dias.length; d++) {
    var dia = dias[d];
    var rifas = historialData[dia] || {};
    var rkeys = Object.keys(rifas);
    var btn = document.createElement('button');
    btn.className = 'exp-btn';
    var span1 = document.createElement('span');
    span1.style.fontWeight = '600';
    span1.style.color = '#00d4ff';
    span1.textContent = fechaLabel(dia);
    var span2 = document.createElement('span');
    span2.style.cssText = 'float:right;font-size:11px;color:rgba(255,255,255,0.4)';
    span2.textContent = rkeys.length + ' rifas';
    btn.appendChild(span1);
    btn.appendChild(span2);
    (function(d2) { btn.onclick = function() { exportarExcel(d2); }; })(dia);
    lista.appendChild(btn);
  }
}

function exportarExcel(fuente) {
  cerrarExportModal();
  var datos, nombreArchivo;
  if (fuente === 'hoy') {
    datos = allData;
    nombreArchivo = 'CajaDorada_Hoy_' + fechaHoy().replace(/-/g, '') + '.xlsx';
  } else {
    datos = historialData[fuente] || {};
    nombreArchivo = 'CajaDorada_' + fuente.replace(/-/g, '') + '.xlsx';
  }
  var keys = Object.keys(datos);
  if (keys.length === 0) { alert('No hay datos para exportar.'); return; }
  var wb = XLSX.utils.book_new();
  for (var i = 0; i < keys.length; i++) {
    var key = keys[i];
    var valorNum = valorDesdeKey(key);
    var numeros = (datos[key] && datos[key].numeros) ? datos[key].numeros : {};
    var rows = [['Numero', 'Estado', 'Pago', 'Apodo', 'Telefono', 'Hora', 'Valor']];
    var total = 0;
    for (var j = 0; j < 100; j++) {
      var dato = numeros[j] || numeros[String(j)];
      var num = String(j).padStart(2, '0');
      if (dato) {
        var esFake = dato.tipo === 'fake';
        var pagado = dato.pago === 'pagado';
        var valor = (!esFake && pagado) ? valorNum : 0;
        total += valor;
        rows.push([num, esFake ? 'Fake' : 'Vendido', esFake ? '-' : (pagado ? 'Pagado' : 'Sin pagar'), esFake ? '-' : (dato.apodo || ''), esFake ? '-' : (dato.tel || ''), tsToHora(dato.ts), valor]);
      } else {
        rows.push([num, 'Libre', '', '', '', '', 0]);
      }
    }
    rows.push(['', '', '', '', '', 'TOTAL RECAUDADO', total]);
    var ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{wch:8},{wch:10},{wch:12},{wch:18},{wch:15},{wch:8},{wch:16}];
    XLSX.utils.book_append_sheet(wb, ws, keyToLabel(key).slice(0, 31));
  }
  XLSX.writeFile(wb, nombreArchivo);
}
